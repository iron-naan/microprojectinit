<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novel Combination Risk Visualiser</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 1em;
    }
    #controls {
      margin-bottom: 1em;
    }
    #graph {
      width: 100%;
      height: 400px;
      border: 1px solid #ccc;
    }
    #description {
      margin-top: 1em;
      padding: 0.5em;
      border: 1px solid #ccc;
      min-height: 80px;
    }
  </style>
</head>
<body>
  <h1>Novel Combination Risk Visualiser</h1>
  <div id="controls">
    <label for="risks">Enter risks (comma separated):</label><br>
    <input type="text" id="risks" size="50" placeholder="e.g. Supply Chain Failure, Cyber Attack, Market Volatility" />
    <button id="visualize">Visualize</button>
  </div>
  <div id="graph"></div>
  <div id="description"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
